AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Paper Trail - Receipt Tracker. Serverless stack.
  One Cognito-authenticated HTTP API handles receipt upload, expense
  listing, and CSV reporting. Mobile-friendly web upload (any file type)
  -> Textract + Bedrock extraction -> DynamoDB -> CSV reporting by
  month / financial year / custom range. Currency defaults to AUD.

  MANUAL STEPS AFTER DEPLOY (cannot be fully automated by CloudFormation):
  1. Enable model access for the Bedrock model you set in BedrockModelId, in the Bedrock console.
  2. Build/upload your frontend to the FrontendBucket (see FrontendBucketName output) and
     invalidate CloudFront after each deploy.

Parameters:
  ProjectName:
    Type: String
    Default: receipt-tracker
    Description: Prefix used for resource names. Lowercase letters, numbers, hyphens only.

  CognitoDomainPrefix:
    Type: String
    Description: >
      Globally-unique prefix for the Cognito Hosted UI domain
      (becomes https://<prefix>.auth.<region>.amazoncognito.com)

  FinancialYearStartMonth:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 12
    Description: Month (1-12) your financial year starts on. Default 7 = July (Australia).

  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-sonnet-20241022-v2:0
    Description: >
      Bedrock model ID (or cross-region inference profile ID) used to turn
      Textract output into structured merchant/amount/category data.

Resources:

  # ---------------------------------------------------------------------
  # Cognito - guards the web frontend and every API route
  # ---------------------------------------------------------------------

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${ProjectName}-users
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Schema:
        - Name: email
          Required: true
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 10
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${ProjectName}-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders: [COGNITO]
      CallbackURLs:
        - !Sub https://${CloudFrontDistribution.DomainName}/callback
        - http://localhost:3000/callback
      LogoutURLs:
        - !Sub https://${CloudFrontDistribution.DomainName}/
        - http://localhost:3000/

  # ---------------------------------------------------------------------
  # DynamoDB
  # ---------------------------------------------------------------------

  ExpensesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ProjectName}-expenses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: sortKey
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: sortKey
          KeyType: RANGE

  # ---------------------------------------------------------------------
  # S3 - receipts and static frontend
  # ---------------------------------------------------------------------

  ReceiptsBucket:
    Type: AWS::S3::Bucket
    DependsOn: ProcessReceiptFunctionS3Permission
    Properties:
      BucketName: !Sub ${ProjectName}-receipts-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: receipts/
            Function: !GetAtt ProcessReceiptFunction.Arn

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-frontend-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${FrontendBucket}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ---------------------------------------------------------------------
  # CloudFront - fronts the static SPA
  # ---------------------------------------------------------------------

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${ProjectName}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: frontend-origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: frontend-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # AWS managed CachingOptimized
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  # ---------------------------------------------------------------------
  # API Gateway (HTTP API) - one Cognito JWT-guarded API for everything
  # ---------------------------------------------------------------------

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${ProjectName}-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Sub https://${CloudFrontDistribution.DomainName}
          - http://localhost:3000
        AllowMethods: [GET, POST, OPTIONS]
        AllowHeaders: [Authorization, Content-Type]

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  CognitoAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      AuthorizerType: JWT
      Name: CognitoAuthorizer
      IdentitySource: ['$request.header.Authorization']
      JwtConfiguration:
        Audience: [!Ref UserPoolClient]
        Issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}

  # -- POST /receipts (upload) --
  ReceiptUploadIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ReceiptUploadFunction.Arn
      PayloadFormatVersion: '2.0'

  ReceiptUploadRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /receipts
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Sub integrations/${ReceiptUploadIntegration}

  ReceiptUploadPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReceiptUploadFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*

  # -- GET /expenses --
  ListExpensesIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ListExpensesFunction.Arn
      PayloadFormatVersion: '2.0'

  ListExpensesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /expenses
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Sub integrations/${ListExpensesIntegration}

  ListExpensesPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ListExpensesFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*

  # -- GET /report --
  GenerateReportIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt GenerateReportFunction.Arn
      PayloadFormatVersion: '2.0'

  GenerateReportRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /report
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Sub integrations/${GenerateReportIntegration}

  GenerateReportPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GenerateReportFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*

  # ---------------------------------------------------------------------
  # Lambda execution roles
  # ---------------------------------------------------------------------

  ReceiptUploadRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ReceiptUploadPut
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub arn:aws:s3:::${ProjectName}-receipts-${AWS::AccountId}-${AWS::Region}/receipts/*

  ProcessReceiptRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ProcessReceipt
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub arn:aws:s3:::${ProjectName}-receipts-${AWS::AccountId}-${AWS::Region}/*
              - Effect: Allow
                Action: textract:AnalyzeExpense
                Resource: '*'
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: '*'
              - Effect: Allow
                Action: dynamodb:PutItem
                Resource: !GetAtt ExpensesTable.Arn

  ListExpensesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: QueryExpenses
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: dynamodb:Query
                Resource: !GetAtt ExpensesTable.Arn

  GenerateReportRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: QueryExpensesForReport
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: dynamodb:Query
                Resource: !GetAtt ExpensesTable.Arn

  # ---------------------------------------------------------------------
  # Lambda functions
  # ---------------------------------------------------------------------

  ReceiptUploadFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-receipt-upload
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ReceiptUploadRole.Arn
      Timeout: 20
      MemorySize: 256
      Environment:
        Variables:
          RECEIPTS_BUCKET: !Sub ${ProjectName}-receipts-${AWS::AccountId}-${AWS::Region}
      Code:
        ZipFile: |
          import boto3, json, os, uuid, base64

          s3 = boto3.client('s3')
          BUCKET = os.environ['RECEIPTS_BUCKET']
          MAX_BYTES = 5 * 1024 * 1024  # keep well under the 6MB Lambda proxy payload limit

          MIME_TO_EXT = {
              'image/jpeg': 'jpg', 'image/png': 'png', 'image/gif': 'gif', 'image/webp': 'webp',
              'image/heic': 'heic', 'image/heif': 'heif', 'image/bmp': 'bmp', 'image/tiff': 'tiff',
              'application/pdf': 'pdf',
              'text/csv': 'csv', 'text/plain': 'txt',
              'application/msword': 'doc',
              'application/vnd.openxmlformats-officedocument.wordprocessingml.document': 'docx',
              'application/vnd.ms-excel': 'xls',
              'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': 'xlsx'
          }

          def resolve_extension(filename, content_type):
              if filename and '.' in filename:
                  candidate = filename.rsplit('.', 1)[-1].lower()
                  if candidate.isalnum() and len(candidate) <= 8:
                      return candidate
              return MIME_TO_EXT.get(content_type, 'dat')

          def handler(event, context):
              claims = event['requestContext']['authorizer']['jwt']['claims']
              user_id = claims['sub']

              try:
                  payload = json.loads(event.get('body') or '{}')
              except json.JSONDecodeError:
                  return _error(400, 'Request body must be JSON.')

              file_b64 = payload.get('fileBase64')
              filename = payload.get('filename', 'receipt')
              content_type = payload.get('contentType', 'application/octet-stream')

              if not file_b64:
                  return _error(400, 'fileBase64 is required.')

              try:
                  file_bytes = base64.b64decode(file_b64)
              except Exception:
                  return _error(400, 'fileBase64 could not be decoded.')

              if len(file_bytes) > MAX_BYTES:
                  return _error(400, 'File is too large (max 5MB).')

              ext = resolve_extension(filename, content_type)
              receipt_id = str(uuid.uuid4())
              key = f"receipts/{user_id}/{receipt_id}.{ext}"

              s3.put_object(Bucket=BUCKET, Key=key, Body=file_bytes, ContentType=content_type)

              return {
                  'statusCode': 200,
                  'headers': {'Content-Type': 'application/json'},
                  'body': json.dumps({'receiptId': receipt_id, 'key': key})
              }

          def _error(status, message):
              return {
                  'statusCode': status,
                  'headers': {'Content-Type': 'application/json'},
                  'body': json.dumps({'error': message})
              }

  ProcessReceiptFunctionS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessReceiptFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:aws:s3:::${ProjectName}-receipts-${AWS::AccountId}-${AWS::Region}
      SourceAccount: !Ref AWS::AccountId

  ProcessReceiptFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-process-receipt
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ProcessReceiptRole.Arn
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          TABLE_NAME: !Ref ExpensesTable
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          LOG_LEVEL: INFO
      Code:
        ZipFile: |
          import boto3, json, os, re, time, logging, urllib.parse
          from datetime import datetime, timezone

          logger = logging.getLogger()
          logger.setLevel(os.environ.get('LOG_LEVEL', 'INFO'))

          textract = boto3.client('textract')
          bedrock = boto3.client('bedrock-runtime')
          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table(os.environ['TABLE_NAME'])
          MODEL_ID = os.environ['BEDROCK_MODEL_ID']

          # Matches a fenced code block, optionally tagged ```json ... ```
          _CODE_FENCE_RE = re.compile(r"```(?:json)?\s*(.*?)\s*```", re.DOTALL | re.IGNORECASE)
          # Fallback: grab the first {...} blob in the text
          _JSON_OBJECT_RE = re.compile(r"\{.*\}", re.DOTALL)


          def extract_json(content: str):
              """
              Bedrock/Claude responses can come back wrapped in markdown code fences
              or with stray leading/trailing text even when the prompt asks for
              'ONLY valid JSON'. Try a few strategies before giving up.
              """
              if not content:
                  raise ValueError("empty content")

              candidates = []

              fence_match = _CODE_FENCE_RE.search(content)
              if fence_match:
                  candidates.append(fence_match.group(1))

              candidates.append(content.strip())

              obj_match = _JSON_OBJECT_RE.search(content)
              if obj_match:
                  candidates.append(obj_match.group(0))

              last_err = None
              for candidate in candidates:
                  try:
                      return json.loads(candidate)
                  except json.JSONDecodeError as e:
                      last_err = e
                      continue

              raise last_err or json.JSONDecodeError("no JSON found", content, 0)


          def normalize_date(raw):
              # Guarantees a strict, zero-padded YYYY-MM-DD string, since Bedrock
              # doesn't always follow the requested format exactly and an
              # inconsistent format silently breaks the month/financial-year
              # range queries (they rely on lexicographic string comparison).
              if raw:
                  for fmt in ('%Y-%m-%d', '%Y-%m-%d %H:%M:%S', '%d/%m/%Y', '%m/%d/%Y',
                              '%d-%m-%Y', '%d %b %Y', '%d %B %Y', '%b %d, %Y', '%B %d, %Y'):
                      try:
                          return datetime.strptime(str(raw).strip(), fmt).strftime('%Y-%m-%d')
                      except ValueError:
                          continue
              return datetime.now(timezone.utc).strftime('%Y-%m-%d')


          def handler(event, context):
              records = event.get('Records', [])
              logger.info(json.dumps({
                  "event": "invocation_start",
                  "requestId": context.aws_request_id,
                  "recordCount": len(records)
              }))

              processed = 0
              failed = 0

              for record in records:
                  bucket = record['s3']['bucket']['name']
                  key = urllib.parse.unquote_plus(record['s3']['object']['key'])
                  parts = key.split('/')

                  if len(parts) < 3:
                      logger.warning(json.dumps({
                          "event": "skipped_invalid_key",
                          "bucket": bucket,
                          "key": key,
                          "reason": "key does not have expected prefix/user/file structure"
                      }))
                      continue

                  user_id = parts[1]
                  receipt_id = os.path.splitext(parts[2])[0]

                  logger.info(json.dumps({
                      "event": "record_start",
                      "bucket": bucket,
                      "key": key,
                      "userId": user_id,
                      "receiptId": receipt_id
                  }))

                  try:
                      # --- Textract ---
                      t0 = time.time()
                      textract_resp = textract.analyze_expense(
                          Document={'S3Object': {'Bucket': bucket, 'Name': key}}
                      )
                      textract_ms = round((time.time() - t0) * 1000, 1)

                      summary_fields = []
                      try:
                          doc = textract_resp['ExpenseDocuments'][0]
                          for field in doc.get('SummaryFields', []):
                              label = field.get('Type', {}).get('Text', '')
                              value = field.get('ValueDetection', {}).get('Text', '')
                              if label and value:
                                  summary_fields.append(f"{label}: {value}")
                      except (IndexError, KeyError):
                          logger.warning(json.dumps({
                              "event": "textract_no_expense_document",
                              "receiptId": receipt_id
                          }))

                      extracted_text = "\n".join(summary_fields)

                      logger.info(json.dumps({
                          "event": "textract_complete",
                          "receiptId": receipt_id,
                          "durationMs": textract_ms,
                          "fieldCount": len(summary_fields),
                          "extractedTextLength": len(extracted_text)
                      }))

                      if not extracted_text:
                          logger.warning(json.dumps({
                              "event": "textract_empty_extraction",
                              "receiptId": receipt_id,
                              "reason": "no summary fields extracted; Bedrock will have nothing to work with"
                          }))

                      # --- Bedrock ---
                      prompt = (
                          "Extract structured expense data from this receipt data. "
                          "Respond with ONLY valid JSON, no markdown code fences, "
                          "no explanation, and no other text before or after the JSON.\n\n"
                          f"Receipt data:\n{extracted_text}\n\n"
                          'Return JSON in this exact format: '
                          '{"merchant": "...", "amount": 0.00, "currency": "AUD", '
                          '"date": "YYYY-MM-DD", "category": "one of: Travel, Meals, '
                          'Office Supplies, Software, Utilities, Other, Groceries"}'
                      )

                      t0 = time.time()
                      bedrock_resp = bedrock.invoke_model(
                          modelId=MODEL_ID,
                          body=json.dumps({
                              "anthropic_version": "bedrock-2023-05-31",
                              "max_tokens": 300,
                              "messages": [{"role": "user", "content": prompt}]
                          })
                      )
                      bedrock_ms = round((time.time() - t0) * 1000, 1)

                      result = json.loads(bedrock_resp['body'].read())
                      content = result['content'][0]['text']
                      usage = result.get('usage', {})

                      logger.info(json.dumps({
                          "event": "bedrock_complete",
                          "receiptId": receipt_id,
                          "durationMs": bedrock_ms,
                          "modelId": MODEL_ID,
                          "inputTokens": usage.get('input_tokens'),
                          "outputTokens": usage.get('output_tokens')
                      }))

                      try:
                          expense_data = extract_json(content)
                          if not isinstance(expense_data, dict):
                              raise ValueError(f"parsed JSON is not an object: {type(expense_data)}")
                      except (json.JSONDecodeError, ValueError) as e:
                          # Log the FULL raw content (not just a preview) so parse
                          # failures are actually debuggable, plus the error itself.
                          logger.warning(json.dumps({
                              "event": "bedrock_response_parse_failed",
                              "receiptId": receipt_id,
                              "error": str(e),
                              "rawContent": content
                          }))
                          expense_data = {
                              "merchant": "Unknown", "amount": 0, "currency": "AUD",
                              "date": datetime.now(timezone.utc).strftime('%Y-%m-%d'),
                              "category": "Other"
                          }

                      expense_date = normalize_date(expense_data.get('date'))

                      # --- DynamoDB ---
                      table.put_item(Item={
                          'userId': user_id,
                          'sortKey': f"{expense_date}#{receipt_id}",
                          'receiptId': receipt_id,
                          'merchant': expense_data.get('merchant', 'Unknown'),
                          'amount': str(expense_data.get('amount', 0)),
                          'currency': expense_data.get('currency', 'AUD'),
                          'category': expense_data.get('category', 'Other'),
                          'expenseDate': expense_date,
                          's3Key': key,
                          'createdAt': datetime.now(timezone.utc).isoformat()
                      })

                      logger.info(json.dumps({
                          "event": "record_complete",
                          "receiptId": receipt_id,
                          "merchant": expense_data.get('merchant', 'Unknown'),
                          "category": expense_data.get('category', 'Other'),
                          "expenseDate": expense_date
                      }))

                      processed += 1

                  except Exception:
                      failed += 1
                      logger.exception(json.dumps({
                          "event": "record_failed",
                          "bucket": bucket,
                          "key": key,
                          "userId": user_id,
                          "receiptId": receipt_id
                      }))
                      continue

              logger.info(json.dumps({
                  "event": "invocation_complete",
                  "requestId": context.aws_request_id,
                  "processed": processed,
                  "failed": failed,
                  "total": len(records)
              }))

              return {'statusCode': 200, 'processed': processed, 'failed': failed}

  ListExpensesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-list-expenses
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ListExpensesRole.Arn
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: !Ref ExpensesTable
      Code:
        ZipFile: |
          import boto3, json, os
          from boto3.dynamodb.conditions import Key

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table(os.environ['TABLE_NAME'])

          def handler(event, context):
              claims = event['requestContext']['authorizer']['jwt']['claims']
              user_id = claims['sub']
              qs = event.get('queryStringParameters') or {}
              start = qs.get('start', '0000-00-00')
              end = qs.get('end', '9999-99-99')

              resp = table.query(
                  KeyConditionExpression=Key('userId').eq(user_id) & Key('sortKey').between(start, end + '~')
              )
              return {
                  'statusCode': 200,
                  'headers': {'Content-Type': 'application/json'},
                  'body': json.dumps(resp.get('Items', []), default=str)
              }

  GenerateReportFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-generate-report
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt GenerateReportRole.Arn
      Timeout: 15
      Environment:
        Variables:
          TABLE_NAME: !Ref ExpensesTable
          FY_START_MONTH: !Ref FinancialYearStartMonth
      Code:
        ZipFile: |
          import boto3, json, os, csv, io
          from boto3.dynamodb.conditions import Key
          from datetime import date

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table(os.environ['TABLE_NAME'])
          FY_START_MONTH = int(os.environ.get('FY_START_MONTH', '7'))

          def month_range(value):
              year, month = map(int, value.split('-'))
              start = f"{year:04d}-{month:02d}-01"
              end = f"{year+1:04d}-01-01" if month == 12 else f"{year:04d}-{month+1:02d}-01"
              return start, end

          def financial_year_range(value):
              fy_start_year = int(value)
              start = f"{fy_start_year:04d}-{FY_START_MONTH:02d}-01"
              end = f"{fy_start_year+1:04d}-{FY_START_MONTH:02d}-01"
              return start, end

          def handler(event, context):
              claims = event['requestContext']['authorizer']['jwt']['claims']
              user_id = claims['sub']
              qs = event.get('queryStringParameters') or {}
              period = qs.get('period', 'month')

              if period == 'month':
                  value = qs.get('value', date.today().strftime('%Y-%m'))
                  start, end = month_range(value)
                  query_end = end  # exclusive start of next month - correct as-is
                  filename = f"expenses-{value}.csv"
              elif period == 'financial_year':
                  value = qs.get('value', str(date.today().year))
                  start, end = financial_year_range(value)
                  query_end = end  # exclusive start of next financial year - correct as-is
                  filename = f"expenses-fy{value}.csv"
              else:
                  start = qs.get('start')
                  end = qs.get('end')
                  if not start or not end:
                      return {'statusCode': 400, 'body': json.dumps({'error': 'start and end are required for a custom period'})}
                  # 'end' here is a real inclusive date the user picked. Since sortKey
                  # is "date#receiptId", a plain date string always sorts BEFORE any
                  # key on that same date (e.g. "2026-07-10" < "2026-07-10#abc"), so
                  # without '~' every receipt on the end date is silently excluded.
                  query_end = end + '~'
                  filename = f"expenses-{start}_to_{end}.csv"

              resp = table.query(
                  KeyConditionExpression=Key('userId').eq(user_id) & Key('sortKey').between(start, query_end)
              )
              items = sorted(resp.get('Items', []), key=lambda i: i['sortKey'])

              buf = io.StringIO()
              writer = csv.writer(buf)
              writer.writerow(['Date', 'Merchant', 'Category', 'Amount', 'Currency', 'ReceiptId'])
              total = 0.0
              for item in items:
                  amount = float(item.get('amount', 0))
                  total += amount
                  writer.writerow([item.get('expenseDate'), item.get('merchant'), item.get('category'),
                                    f"{amount:.2f}", item.get('currency'), item.get('receiptId')])
              writer.writerow([])
              writer.writerow(['', '', 'TOTAL', f"{total:.2f}", '', ''])

              return {
                  'statusCode': 200,
                  'headers': {
                      'Content-Type': 'text/csv',
                      'Content-Disposition': f'attachment; filename="{filename}"'
                  },
                  'body': buf.getvalue()
              }

